<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Crys</title>
    <style>
        :root {
            --bronze: #8e735b;
            --creme: #fdf8f5;
            --texto: #4a4a4a;
        }
        body {
            margin: 0; padding: 0;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh;
            background-color: var(--creme);
            font-family: 'Optima', 'Segoe UI', serif;
            color: var(--texto);
        }
        .container {
            text-align: center; padding: 40px;
            max-width: 500px; width: 85%;
            background: #fff; border-radius: 2px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.02);
        }
        h1 { font-weight: 300; letter-spacing: 3px; color: var(--bronze); font-size: 1.4rem; text-transform: uppercase; }
        .linha { width: 40px; height: 1px; background: var(--bronze); margin: 20px auto; }
        p { font-weight: 300; line-height: 1.6; margin-bottom: 30px; }
        
        .options { display: flex; flex-direction: column; gap: 10px; }
        .btn {
            background: none; border: 1px solid #e0e0e0;
            color: var(--texto); padding: 15px;
            font-size: 0.85rem; cursor: pointer;
            transition: all 0.3s; text-align: left;
        }
        .btn:hover { border-color: var(--bronze); background: #fafafa; }
        .hidden { display: none; }
        
        #progress { font-size: 0.7rem; letter-spacing: 2px; color: #bbb; margin-bottom: 10px; text-transform: uppercase; }
    </style>
</head>
<body>

    <div class="container">
        <div id="progress">Questão <span id="num">0</span> de 10</div>
        <h1 id="titulo">Oi Crys</h1>
        <div class="linha"></div>
        <p id="texto">Preparei um pequeno exame de ordem sobre nós dois para relaxar antes da aula. Vamos lá?</p>
        
        <div id="options" class="options">
            </div>
        
        <button id="startBtn" class="btn" style="text-align:center" onclick="nextQuestion()">Iniciar Quiz</button>
    </div>

    <script>
        const questions = [
            {
                q: "Se eu te desse um beijo agora, qual seria a classificação jurídica?",
                options: [
                    "Ato ilícito por falta de citação prévia.",
                    "Negócio jurídico bilateral com consentimento expresso.",
                    "Usucapião extraordinária de afeto."
                ]
            },
            {
                q: "Sobre o nosso jantar: Se eu escolher o restaurante, cabe recurso?",
                options: [
                    "Não, é decisão de instância única e soberana.",
                    "Sim, embargos de declaração para explicar o cardápio.",
                    "Cabe agravo de instrumento se não tiver vinho."
                ]
            },
            {
                q: "No 7º semestre, como você define o tempo que passamos juntos?",
                options: [
                    "Prazo decadencial (corre rápido demais).",
                    "Direito adquirido e inalienável.",
                    "Trânsito em julgado (não mudo por nada)."
                ]
            },
            {
                q: "Qual a 'pena' prevista para quem estuda muito e esquece de descansar?",
                options: [
                    "Medida cautelar de cafuné obrigatório.",
                    "Prisão domiciliar no meu abraço.",
                    "Multa convertida em 1 hora de Netflix."
                ]
            },
            {
                q: "Se eu disser que você é a futura advogada mais brilhante que conheço, isso é:",
                options: [
                    "Fato incontroverso (dispensa provas).",
                    "Doutrina minoritária.",
                    "Prova emprestada de outros admiradores."
                ]
            },
            {
                q: "Sobre 'posse e propriedade': meu coração hoje é...",
                options: [
                    "Objeto de litígio.",
                    "Propriedade exclusiva da Crys, com registro em cartório.",
                    "Bem de uso comum do povo."
                ]
            },
            {
                q: "Qual o fórum competente para discutir saudades?",
                options: [
                    "O juizado de pequenas causas.",
                    "O foro do meu peito, com jurisdição exclusiva.",
                    "Supremo Tribunal do Afeto."
                ]
            },
            {
                q: "Nossa conexão pode ser considerada um contrato?",
                options: [
                    "Sim, de adesão (eu aderi e não saio mais).",
                    "Sim, de execução continuada (pra sempre).",
                    "Não, é um tratado internacional de paz."
                ]
            },
            {
                q: "Se você ganhar uma causa difícil, qual a sucumbência?",
                options: [
                    "O perdedor paga o nosso jantar.",
                    "Eu pago o jantar para comemorar.",
                    "Honorários revertidos em beijos."
                ]
            },
            {
                q: "Última questão: O que acontece após a aula de hoje?",
                options: [
                    "Extinção do processo com resolução de mérito.",
                    "Audiência de conciliação para decidirmos o próximo encontro.",
                    "Mandado de segurança para te ver logo."
                ]
            }
        ];

        let current = -1;

        function nextQuestion() {
            current++;
            document.getElementById('startBtn').classList.add('hidden');
            
            if (current < questions.length) {
                document.getElementById('num').innerText = current + 1;
                document.getElementById('titulo').innerText = "Vade Mecum da Crys";
                document.getElementById('texto').innerText = questions[current].q;
                
                const optionsDiv = document.getElementById('options');
                optionsDiv.innerHTML = '';
                
                questions[current].options.forEach(opt => {
                    const b = document.createElement('button');
                    b.className = 'btn';
                    b.innerText = opt;
                    b.onclick = nextQuestion;
                    optionsDiv.appendChild(b);
                });
            } else {
                showFinal();
            }
        }

        function showFinal() {
            document.getElementById('progress').classList.add('hidden');
            document.getElementById('titulo').innerText = "Aprovada com louvor";
            document.getElementById('texto').innerHTML = "Passando apenas para dizer: <b>Boa aula, Crys.</b><br><br>Arrasa lá hoje, futura Dra. Estou torcendo por você em cada página desse 7º semestre.";
            document.getElementById('options').innerHTML = '';
        }
    </script>
</body>
</html>
